server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Nécessaire pour react-router : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
